name: Atlas Nightly Prerelease

on:
  push:
    branches:
      - nightly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-prerelease:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set nightly version (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $base = node -p "require('./package.json').version"
          $nightly = "$base-nightly.${{ github.run_number }}"
          npm version $nightly --no-git-tag-version
          Write-Output "Nightly version: $nightly"

      - name: Set nightly version (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          base=$(node -p "require('./package.json').version")
          nightly="${base}-nightly.${{ github.run_number }}"
          npm version "$nightly" --no-git-tag-version
          echo "Nightly version: $nightly"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Build and publish nightly (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx vite build && npx electron-builder --win -p always --config.publish.releaseType=prerelease

      - name: Build and publish nightly (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx vite build && npx electron-builder --linux -p always --config.publish.releaseType=prerelease
