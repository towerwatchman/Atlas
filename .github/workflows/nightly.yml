name: Atlas Nightly Prerelease

on:
  push:
    branches:
      - nightly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-prerelease:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: npm install
        shell: cmd

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm install
        shell: bash

      - name: Set nightly version (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          for /f "delims=" %%v in ('node -p "require('./package.json').version"') do set BASE=%%v
          set NIGHTLY=%BASE%-nightly.${{ github.run_number }}
          call npm version %NIGHTLY% --no-git-tag-version
          echo Nightly version: %NIGHTLY%

      - name: Set nightly version (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          base=$(node -p "require('./package.json').version")
          nightly="${base}-nightly.${{ github.run_number }}"
          npm version "$nightly" --no-git-tag-version
          echo "Nightly version: $nightly"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm
        shell: bash

      - name: Build renderer (Windows)
        if: matrix.os == 'windows-latest'
        run: npx vite build
        shell: cmd

      - name: Build renderer (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx vite build
        shell: bash

      - name: Build and publish nightly (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 -p always --config.publish.releaseType=prerelease
        shell: cmd

      - name: Build nightly (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --x64 -p never
        shell: bash

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-nightly-installer
          path: release/*.exe
          if-no-files-found: warn

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-nightly-installer
          path: |
            release/*.deb
            release/*.AppImage
            release/*.pacman
          if-no-files-found: warn
