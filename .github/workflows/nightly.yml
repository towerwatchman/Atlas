name: Atlas Nightly Prerelease

on:
  push:
    branches:
      - nightly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-prerelease:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm ci

      - name: Set nightly version
        shell: bash
        run: |
          base_version=$(node -p "require('./package.json').version")
          nightly_version="${base_version}-nightly.${{ github.run_number }}"
          npm version "$nightly_version" --no-git-tag-version
          echo "Nightly version: $nightly_version"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Build and publish nightly prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          platform=${{ matrix.os == 'windows-latest' && '--win' || '--linux' }}
          npx vite build && npx electron-builder $platform -p always --config.publish.releaseType=prerelease
