<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Select Executable</title>
  <link rel="stylesheet" href="../../../assets/css/tailwind.output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../../../assets/css/main.css">
</head>
<body class="bg-transparent">
  <div class="h-screen flex items-center justify-center bg-gradient-to-b from-primary to-secondary border border-accent rounded-lg">
    <div class="w-[480px] bg-secondary rounded-lg overflow-hidden shadow-2xl">
      <!-- Title -->
      <div class="bg-primary px-4 py-3 border-b border-border flex items-center">
        <span class="font-medium text-text">Select Main Executable</span>
      </div>

      <div class="p-6">
        <p class="text-text mb-4">Multiple executables found.<br>Please choose the main game launcher:</p>
        
        <select id="exe-select" size="8" class="w-full bg-tertiary border border-border rounded p-3 text-text focus:outline-none focus:ring-2 focus:ring-accent">
          <!-- populated by JS -->
        </select>
      </div>

      <div class="flex justify-end gap-3 p-4 border-t border-border">
        <button id="cancel" class="px-6 py-2 bg-tertiary hover:bg-selected rounded text-text">Cancel</button>
        <button id="confirm" class="px-6 py-2 bg-accent hover:bg-accent-dark text-white rounded font-medium">Confirm</button>
      </div>
    </div>
  </div>

<script>
  const { ipcRenderer } = require('electron');

  ipcRenderer.on('init-chooser', (e, data) => {
    console.log("Received in modal:", data); // ← add this debug
    const select = document.getElementById('exe-select');
    select.innerHTML = data.executables
      .map(exe => `<option value="${exe}">${exe}</option>`)
      .join('');
  });

  document.getElementById('confirm').onclick = () => {
    const val = document.getElementById('exe-select').value;
    if (val) {
      ipcRenderer.send('executable-chosen', { selectedExecutable: val });
    }
    window.close();
  };

  document.getElementById('cancel').onclick = () => {
    ipcRenderer.send('executable-chosen', { selectedExecutable: null });
    window.close();
  };
</script>
</body>
</html>
